        :root {
            --primary: #2563eb; --primary-dark: #1e40af; --bg: #f8fafc;
            --surface: #ffffff; --text: #0f172a; --text-sub: #64748b;
            --border: #e2e8f0; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            --success: #10b981; --warning: #f59e0b; --groq: #f97316;
        }
        [data-theme="dark"] {
            --primary: #60a5fa; --primary-dark: #3b82f6; --bg: #0f172a;
            --surface: #1e293b; --text: #f8fafc; --text-sub: #94a3b8;
            --border: #334155; --shadow: 0 4px 6px -1px rgba(0,0,0,0.5);
            --groq: #fb923c;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); display: flex; align-items: center;
            justify-content: space-between; padding: 0 20px; z-index: 1000;
        }
        [data-theme="dark"] .header { background: rgba(30,41,59,0.9); }
        .logo { font-weight: 800; font-size: 1.25rem; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .logo-badge { background: var(--primary); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: 700; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .icon-btn {
            background: transparent; border: 1px solid var(--border); color: var(--text);
            border-radius: 8px; width: 40px; height: 40px; display: flex; align-items: center;
            justify-content: center; font-size: 1.1rem; cursor: pointer; transition: all 0.2s;
        }
        .icon-btn:hover { background: var(--border); }
        .status-indicator {
            display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-sub);
            padding: 4px 10px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border);
        }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
        .status-dot.groq-mode { background: var(--groq); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .category-bar {
            position: fixed; top: 60px; left: 0; right: 0; height: 44px;
            background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 8px; padding: 0 16px;
            overflow-x: auto; z-index: 999; scrollbar-width: none;
        }
        .category-bar::-webkit-scrollbar { display: none; }
        .cat-btn {
            white-space: nowrap; padding: 6px 14px; border-radius: 20px;
            border: 1px solid var(--border); background: transparent; color: var(--text-sub);
            font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
        }
        .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .feed-container {
            height: 100vh; padding-top: 114px; padding-bottom: 170px;
            overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth;
        }
        .card-wrapper {
            min-height: calc(100vh - 284px); width: 100%; scroll-snap-align: center;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .card {
            background: var(--surface); width: 100%; max-width: 700px; padding: 30px;
            border-radius: 24px; border: 1px solid var(--border); box-shadow: var(--shadow);
            display: flex; flex-direction: column; max-height: 68vh; overflow-y: auto;
        }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
        .badge { background: rgba(37,99,235,0.1); color: var(--primary); padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .manual-badge { background: rgba(16,185,129,0.1); color: var(--success); padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .source-badge { background: rgba(16,185,129,0.1); color: var(--success); padding: 6px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .headline { font-size: 1.5rem; font-weight: 800; line-height: 1.3; margin-bottom: 16px; color: var(--text); }
        .summary-section { background: rgba(37,99,235,0.05); padding: 16px; border-radius: 12px; margin-bottom: 16px; border-left: 3px solid var(--primary); }
        .groq-section { background: rgba(249,115,22,0.05); border-left: 3px solid var(--groq); }
        .basic-section { background: rgba(245,158,11,0.05); border-left: 3px solid var(--warning); }
        .summary-label { font-size: 0.7rem; color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .summary-label.groq { color: var(--groq); }
        .body-text { font-size: 1rem; line-height: 1.7; color: var(--text-sub); }
        .attribution { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 0.82rem; color: var(--text-sub); }
        .attribution a { color: var(--primary); text-decoration: none; }
        .controls-bar {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--surface); padding: 12px 30px; border-radius: 50px;
            display: flex; align-items: center; gap: 30px;
            box-shadow: 0 20px 40px -5px rgba(0,0,0,0.3); z-index: 1000; border: 1px solid var(--border);
        }
        .ctrl-btn { background: none; border: none; font-size: 1.6rem; cursor: pointer; color: var(--text-sub); transition: 0.2s; }
        .ctrl-btn:hover { color: var(--primary); }
        .play-btn { color: var(--primary); font-size: 2.2rem; }
        .footer {
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9);
            border-top: 1px solid var(--border); padding: 8px 20px; text-align: center;
            font-size: 0.75rem; color: var(--text-sub); z-index: 999; backdrop-filter: blur(12px);
        }
        [data-theme="dark"] .footer { background: rgba(30,41,59,0.9); }
        .footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 2000;
            align-items: center; justify-content: center;
        }
        .modal.open { display: flex; }
        .modal-box {
            background: var(--surface); width: 90%; max-width: 500px; padding: 30px;
            border-radius: 24px; border: 1px solid var(--border);
            max-height: 85vh; overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .modal-title { font-size: 1.2rem; font-weight: 800; }
        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-sub); line-height: 1; }
        .form-label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-select {
            width: 100%; padding: 12px 14px; margin-bottom: 20px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg); color: var(--text);
            font-size: 0.95rem; outline: none; cursor: pointer;
        }
        .form-select:focus { border-color: var(--primary); }
        .voice-select {
            width: 100%; padding: 4px; margin-bottom: 20px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg); color: var(--text);
            font-size: 0.88rem; outline: none; height: 180px;
        }
        .voice-count { display: inline-block; background: rgba(37,99,235,0.1); color: var(--primary); font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: 700; margin-left: 6px; }
        .info-box { background: rgba(37,99,235,0.05); padding: 10px 14px; border-radius: 8px; font-size: 0.82rem; margin-bottom: 16px; border-left: 3px solid var(--primary); color: var(--text-sub); }
        .save-btn {
            width: 100%; padding: 15px; background: var(--primary); color: white; border: none;
            border-radius: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s;
        }
        .save-btn:hover { background: var(--primary-dark); }
        @media (min-width: 768px) {
            .headline { font-size: 1.9rem; }
            .card { padding: 40px; max-width: 800px; }
        }
    </style>
</head>

        return `https://news.google.com/rss/topics/CAAqJggKIiBDQkFTRWdvSUwyMHZNRFZxYUdjU0FtVnVHZ0pWVXlnQVAB?hl=${hl[lang]||'en-US'}&gl=${gl[lang]||'US'}&ceid=${ceid[lang]||'US:en'}`;
    }
    if (queries[cat]) {
        return `https://news.google.com/rss/search?q=${queries[cat]}&hl=${hl[lang]||'en-US'}&gl=${gl[lang]||'US'}&ceid=${ceid[lang]||'US:en'}`;
    }
    return null;
}

// ================================================================
//  PROXY — 3 fallbacks
// ================================================================
const PROXIES = [
    u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];

async function fetchViaProxy(url) {
    for (let i = 0; i < PROXIES.length; i++) {
        try {
            const res = await fetch(PROXIES[i](url), { signal: AbortSignal.timeout(9000) });
            if (!res.ok) continue;
            const text = i === 0 ? (await res.json()).contents || '' : await res.text();
            if (text && text.includes('<item>')) return text;
        } catch(e) { console.warn(`Proxy ${i} failed:`, e.message); }
    }
    return null;
}

// ================================================================
//  GROQ — STRICT translation + summarize
// ================================================================
const GROQ_API_KEY = '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';
const GROQ_URL     = 'https://api.groq.com/openai/v1/chat/completions';

// Translate a BATCH of items in one Groq call (much faster)
async function groqTranslateBatch(items, targetLang) {
    if (!items.length) return [];
    const langName = LANG_FULL[targetLang] || 'English';
    const isEn     = targetLang === 'en';

    // Build a numbered list for the prompt
    const inputText = items.map((item, i) =>
        `[${i+1}] TITLE: ${item.title}\nCONTENT: ${(item.description || item.title).substring(0, 300)}`
    ).join('\n\n');

    const prompt = isEn
        ? `Summarize each news item in 2 sentences. Return ONLY a JSON array like:
[{"t":"title 1","s":"summary 1"},{"t":"title 2","s":"summary 2"},...]

News items:
${inputText}`
        : `You MUST translate AND summarize each news item into ${langName} language.
Every single word in "t" and "s" fields MUST be in ${langName} script/language. 
Do NOT use English words at all in your response.
Return ONLY a JSON array like:
[{"t":"${langName} title here","s":"${langName} summary here"},...]

News items to translate into ${langName}:
${inputText}`;

    try {
        const res = await fetch(GROQ_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + GROQ_API_KEY
            },
            body: JSON.stringify({
                model: 'llama-3.3-70b-versatile',
                messages: [
                    {
                        role: 'system',
                        content: isEn
                            ? 'You are a news summarizer. Always respond with valid JSON array only.'
                            : `You are a professional translator and news summarizer. 
You ONLY write in ${langName}. Never use English in your responses.
Always respond with a valid JSON array only. No markdown, no explanations.`
                    },
                    { role: 'user', content: prompt }
                ],
                temperature: 0.1,
                max_tokens:  1500
            }),
            signal: AbortSignal.timeout(30000)
        });

        if (!res.ok) { console.warn('Groq HTTP error:', res.status); return []; }
        const data    = await res.json();
        const content = data.choices?.[0]?.message?.content?.trim() || '';

        // Extract JSON array robustly
        const match = content.match(/\[[\s\S]*\]/);
        if (!match) { console.warn('Groq: no JSON array in response:', content.substring(0,200)); return []; }

        const parsed = JSON.parse(match[0]);
        return Array.isArray(parsed) ? parsed : [];
    } catch(e) {
        console.warn('Groq batch error:', e.message);
        return [];
    }
}

// ================================================================
//  STATE
// ================================================================
let currentLang     = localStorage.getItem('selectedLang')  || 'en';
let currentCategory = 'all';
let currentVoice    = localStorage.getItem('selectedVoice') || '';
let allItems        = [];
let filteredItems   = [];
let currentIndex    = 0;
let isPlaying       = false;
let deviceVoices    = [];
let isFetching      = false;

// ================================================================
//  TTS
// ================================================================
function loadDeviceVoices() {
    deviceVoices = window.speechSynthesis.getVoices();
}

function buildVoiceList(langCode) {
    const hardcoded = GOOGLE_VOICES[langCode] || [];
    const base      = langCode.toLowerCase();
    const hardNames = new Set(hardcoded.map(v => v.name.toLowerCase()));
    const extras    = deviceVoices
        .filter(v => v.lang.toLowerCase().startsWith(base) && !hardNames.has(v.name.toLowerCase()))
        .map(v => ({ name: v.name, lang: v.lang, gender: '🔊' }));
    return [...hardcoded, ...extras];
}

function populateVoiceSelect(langCode) {
    const sel   = document.getElementById('voice-select');
    const badge = document.getElementById('voice-count');
    if (!sel) return;
    sel.innerHTML = '';

    const voices = buildVoiceList(langCode);
    const saved  = localStorage.getItem('selectedVoice') || currentVoice;
    let count = 0, found = false;

    const groups = {
        '🎙️ Google Voices':         [],
        '🖥️ System / macOS Voices': [],
        '🖥️ Device Voices':         []
    };
    voices.forEach(v => {
        if      (v.name.startsWith('Google')) groups['🎙️ Google Voices'].push(v);
        else if (v.gender === '🔊')           groups['🖥️ Device Voices'].push(v);
        else                                  groups['🖥️ System / macOS Voices'].push(v);
    });

    Object.entries(groups).forEach(([label, list]) => {
        if (!list.length) return;
        const grp = document.createElement('optgroup');
        grp.label = label;
        list.forEach(v => {
            const opt       = document.createElement('option');
            opt.value       = v.name;
            opt.textContent = `${v.gender} ${v.name} (${v.lang})`;
            if (v.name === saved) { opt.selected = true; found = true; }
            grp.appendChild(opt);
            count++;
        });
        sel.appendChild(grp);
    });

    if (!found && sel.options.length > 0) sel.options[0].selected = true;
    if (badge) badge.textContent = `${count} voice${count !== 1 ? 's' : ''}`;
}

function resolveVoice(name) {
    if (!name) return null;
    return deviceVoices.find(v => v.name === name)
        || deviceVoices.find(v => v.name.toLowerCase().includes(
               name.toLowerCase().replace('google ', '').split(' ')[0]))
        || null;
}

function speakItem(item) {
    const synth = window.speechSynthesis;
    synth.cancel();
    const text  = addPauses((item.displayTitle || '') + '. ' + (item.displaySummary || ''));
    const utt   = new SpeechSynthesisUtterance(text);
    const vName = document.getElementById('voice-select')?.value || currentVoice;
    const voice = resolveVoice(vName);
    if (voice) { utt.voice = voice; utt.lang = voice.lang; }
    else utt.lang = GOOGLE_VOICES[currentLang]?.[0]?.lang || 'en-US';
    utt.rate = 0.9; utt.pitch = 1.0; utt.volume = 1.0;
    utt.onend = () => {
        isPlaying = false;
        document.getElementById('play-btn').textContent = '▶';
        setTimeout(goNext, 1000);
    };
    utt.onerror = () => {
        isPlaying = false;
        document.getElementById('play-btn').textContent = '▶';
    };
    synth.speak(utt);
}

function addPauses(text) {
    return (text||'').replace(/\. /g,'., ').replace(/: /g,':, ')
        .replace(/; /g,';, ').replace(/ - /g,', - ')
        .replace(/\? /g,'?, ').replace(/! /g,'!, ');
}

// ================================================================
//  HELPERS
// ================================================================
function decodeHtml(t) {
    return (t||'').replace(/<[^>]*>/g,'')
        .replace(/&nbsp;/g,' ').replace(/&amp;/g,'&')
        .replace(/&lt;/g,'<').replace(/&gt;/g,'>')
        .replace(/&#39;/g,"'").replace(/&quot;/g,'"')
        .replace(/\s+/g,' ').trim();
}

function basicSummary(text) {
    if (!text||text.trim().length<10) return 'Tap "Read full article" for details.';
    const s = text.split(/[.!?]+/).filter(x=>x.trim().length>20).slice(0,2).join('. ').trim();
    return s ? s+'.' : text.substring(0,180)+'...';
}

function getCustomFeeds() {
    try { return JSON.parse(localStorage.getItem('newsflow_custom_feeds')||'[]').map(f=>f.url); }
    catch { return []; }
}

function getManualPosts() {
    try { return JSON.parse(localStorage.getItem('newsflow_manual')||'[]'); }
    catch { return []; }
}

function parseRSS(xmlText, sourceHost) {
    const xml   = new DOMParser().parseFromString(xmlText, 'text/xml');
    const items = [];
    xml.querySelectorAll('item').forEach((el, i) => {
        if (i >= 12) return;
        const title = decodeHtml(el.querySelector('title')?.textContent || '');
        const desc  = decodeHtml(el.querySelector('description')?.textContent || '');
        const link  = (el.querySelector('link')?.textContent || '').trim();
        if (!title || title.length < 4) return;
        items.push({
            title,
            description:    desc,
            link,
            source:         sourceHost,
            isManual:       false,
            displayTitle:   title,
            displaySummary: basicSummary(desc || title),
            summaryMode:    'basic'
        });
    });
    return items;
}

// ================================================================
//  FETCH NEWS
// ================================================================
async function fetchNews() {
    if (isFetching) return;
    isFetching = true;
    stopPlay();
    setStatus('⏳ Fetching...');

    // Build URL list for current lang + category
    const urls = [];

    if (currentCategory === 'all') {
        // Use native language feeds
        (LANG_FEEDS[currentLang] || LANG_FEEDS['en']).forEach(u => urls.push(u));
    } else {
        // Category URL in native language
        const catUrl = getCatUrl(currentCategory, currentLang);
        if (catUrl) urls.push(catUrl);
        // Also add base lang feed for more content
        const baseFeed = (LANG_FEEDS[currentLang] || LANG_FEEDS['en'])[0];
        if (baseFeed) urls.push(baseFeed);
    }

    // Admin custom feeds
    getCustomFeeds().forEach(u => urls.push(u));

    let raw = [];
    for (const url of urls) {
        try {
            let host = 'News';
            try { host = new URL(url).hostname.replace('www.',''); } catch {}
            setStatus(`⏳ Loading ${host}...`);

            const text = await fetchViaProxy(url);
            if (!text) { console.warn('No data:', url); continue; }

            const parsed = parseRSS(text, host);
            console.log(`✅ ${parsed.length} items from ${host}`);
            raw.push(...parsed);
            if (raw.length >= 25) break;
        } catch(e) { console.warn('Feed error:', e.message); }
    }

    // Fallback to English BBC if nothing loaded
    if (raw.length === 0) {
        console.warn('All feeds failed, trying BBC fallback...');
        const fallback = await fetchViaProxy('https://feeds.bbci.co.uk/news/rss.xml');
        if (fallback) raw.push(...parseRSS(fallback, 'bbc.co.uk'));
    }

    if (raw.length === 0) {
        isFetching = false;
        setStatus('❌ No news loaded');
        document.getElementById('feed').innerHTML = `
            <div class="card-wrapper"><div class="card">
                <div class="card-header"><div class="badge">⚠️ ERROR</div></div>
                <div class="headline">Could not load news</div>
                <div class="body-text">Please check your internet and tap Retry.</div>
                <div style="margin-top:20px">
                    <button onclick="isFetching=false;fetchNews()" style="padding:12px 28px;background:var(--primary);color:white;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer">🔄 Retry</button>
                </div>
            </div></div>`;
        return;
    }

    // Deduplicate
    const seen = new Set();
    raw = raw.filter(item => {
        const k = item.title.toLowerCase().substring(0,50);
        if (seen.has(k)) return false;
        seen.add(k); return true;
    }).sort(() => Math.random()-0.5).slice(0,30);

    // ── Step 1: Show immediately with basic summaries ──────────
    allItems = raw;
    mergeManual();
    renderFeed();
    setStatus(`📰 ${raw.length} articles — translating to ${LANG_NAMES[currentLang]}...`);

    // ── Step 2: Batch translate via Groq ───────────────────────
    // Process in batches of 5 (keeps prompt small, faster response)
    const BATCH = 5;
    const nonManual = allItems.filter(i => !i.isManual);

    for (let b = 0; b < nonManual.length; b += BATCH) {
        const batch   = nonManual.slice(b, b + BATCH);
        const results = await groqTranslateBatch(batch, currentLang);

        results.forEach((r, i) => {
            const item = batch[i];
            if (!item) return;
            // Find this item in allItems and update it
            const idx = allItems.findIndex(a => a.title === item.title && !a.isManual);
            if (idx === -1) return;

            if (r.t && r.t.trim().length > 2) allItems[idx].displayTitle   = r.t.trim();
            if (r.s && r.s.trim().length > 2) allItems[idx].displaySummary = r.s.trim();
            allItems[idx].summaryMode = 'groq';
        });

        // Re-render after each batch so user sees live updates
        renderFeed();
        setStatus(`✨ Translating... ${Math.min(b+BATCH, nonManual.length)}/${nonManual.length}`);
    }

    // Cache
    try {
        localStorage.setItem('newsflow_cache',      JSON.stringify(allItems));
        localStorage.setItem('newsflow_cache_ts',   Date.now().toString());
        localStorage.setItem('newsflow_cache_lang', currentLang);
        localStorage.setItem('newsflow_cache_cat',  currentCategory);
    } catch(e) {}

    isFetching = false;
    renderFeed();
    setStatus(`✅ ${filteredItems.length} articles`);
}

// ================================================================
//  MERGE + RENDER
// ================================================================
function mergeManual() {
    const manual = getManualPosts();
    allItems = allItems.filter(i => !i.isManual);
    manual.forEach(m => {
        allItems.unshift({
            title:          m.title || 'Untitled',
            displayTitle:   m.title || 'Untitled',
            description:    m.body  || '',
            displaySummary: m.summary || (m.body||'').substring(0,200)+'...',
            source:         m.source || 'Admin',
            link:           '',
            summaryMode:    'manual',
            isManual:       true,
            category:       m.category || 'all'
        });
    });
}

function renderFeed() {
    const feed = document.getElementById('feed');
    if (!feed) return;

    filteredItems = currentCategory === 'all'
        ? [...allItems]
        : allItems.filter(i => !i.isManual || i.category === currentCategory || i.category === 'all');

    if (!filteredItems.length) {
        feed.innerHTML = `<div class="card-wrapper"><div class="card">
            <div class="headline">Loading...</div>
            <div class="body-text">Fetching news, please wait.</div>
        </div></div>`;
        return;
    }

    // Smart patch: update existing cards if count matches
    const existing = feed.querySelectorAll('.card-wrapper');
    if (existing.length === filteredItems.length) {
        filteredItems.forEach((item, i) => {
            const cw  = existing[i];
            if (!cw) return;
            cw.querySelector('.headline').textContent   = item.displayTitle;
            cw.querySelector('.body-text').textContent  = item.displaySummary;
            const lbl = cw.querySelector('.summary-label');
            const ss  = cw.querySelector('.summary-section');
            if (lbl) {
                lbl.className   = 'summary-label' + (item.summaryMode==='groq' ? ' groq' : '');
                lbl.textContent = item.isManual       ? '📌 Admin Note'
                    : item.summaryMode==='groq' && currentLang!=='en'
                        ? `⚡ AI (${LANG_NAMES[currentLang]})`
                    : item.summaryMode==='groq' ? '⚡ Groq AI Summary'
                    : '📝 Quick Summary';
            }
            if (ss) {
                ss.className = 'summary-section'
                    + (item.summaryMode==='groq'  ? ' groq-section'  : '')
                    + (item.summaryMode==='basic' ? ' basic-section' : '');
            }
        });
    } else {
        // Full rebuild
        feed.innerHTML = '';
        filteredItems.forEach(item => feed.appendChild(buildCard(item)));
    }

    updateStatusDot();
}

function buildCard(item) {
    const isGroq   = item.summaryMode === 'groq';
    const isManual = item.isManual;
    const div      = document.createElement('div');
    div.className  = 'card-wrapper';

    // Fix: correct ternary for summary-section class
    const sectionClass = isGroq ? ' groq-section' : isManual ? '' : ' basic-section';

    div.innerHTML = `
        <div class="card">
            <div class="card-header">
                <div class="${isManual ? 'manual-badge' : 'badge'}">
                    ${isManual ? '📌 EDITOR\'S PICK' : LANG_NAMES[currentLang] || 'News'}
                </div>
                <div class="source-badge">📰 ${item.source}</div>
            </div>
            <div class="headline">${item.displayTitle}</div>
            <div class="summary-section${sectionClass}">
                <div class="summary-label${isGroq ? ' groq' : ''}">
                    ${isManual
                        ? '📌 Admin Note'
                        : isGroq && currentLang !== 'en'
                            ? `⚡ AI (${LANG_NAMES[currentLang]})`
                            : isGroq
                                ? '⚡ Groq AI Summary'
                                : '📝 Quick Summary'}
                </div>
                <div class="body-text">${item.displaySummary}</div>
            </div>
            <div class="attribution">
                Source: <strong>${item.source}</strong>
                ${item.link
                    ? ` &nbsp;·&nbsp; <a href="${item.link}" target="_blank" rel="noopener">Read full article ↗</a>`
                    : ''}
            </div>
        </div>`;
    return div;
}


// ================================================================
//  CONTROLS
// ================================================================
function goNext() {
    stopPlay();
    if (currentIndex < filteredItems.length-1) { currentIndex++; scrollToIndex(currentIndex); }
}
function goPrev() {
    stopPlay();
    if (currentIndex > 0) { currentIndex--; scrollToIndex(currentIndex); }
}
function scrollToIndex(idx) {
    document.querySelectorAll('.card-wrapper')[idx]?.scrollIntoView({behavior:'smooth',block:'center'});
    updateStatusDot();
}
function togglePlay() {
    if (isPlaying) { stopPlay(); return; }
    const item = filteredItems[currentIndex];
    if (!item) return;
    isPlaying = true;
    document.getElementById('play-btn').textContent = '⏸';
    speakItem(item);
}
function stopPlay() {
    isPlaying = false;
    window.speechSynthesis.cancel();
    document.getElementById('play-btn').textContent = '▶';
}
function setStatus(t) {
    const el = document.getElementById('status-text');
    if (el) el.textContent = t;
}
function updateStatusDot() {
    const dot  = document.getElementById('status-dot');
    const txt  = document.getElementById('status-text');
    const item = filteredItems[currentIndex];
    if (dot) dot.classList.toggle('groq-mode', item?.summaryMode==='groq');
    if (txt && filteredItems.length>0) txt.textContent = `${currentIndex+1} / ${filteredItems.length}`;
}

// ================================================================
//  BOOT
// ================================================================
document.addEventListener('DOMContentLoaded', () => {

    document.body.setAttribute('data-theme', localStorage.getItem('theme')||'light');
    document.getElementById('lang-select').value = currentLang;

    if (window.speechSynthesis.onvoiceschanged !== undefined) {
        window.speechSynthesis.onvoiceschanged = () => { loadDeviceVoices(); populateVoiceSelect(currentLang); };
    }
    loadDeviceVoices();
    populateVoiceSelect(currentLang);

    // Theme
    document.getElementById('theme-btn').addEventListener('click', () => {
        const t = document.body.getAttribute('data-theme')==='dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
    });

    // Settings open/close
    document.getElementById('settings-btn').addEventListener('click', () => {
        document.getElementById('lang-select').value = currentLang;
        populateVoiceSelect(currentLang);
        document.getElementById('settings-modal').classList.add('open');
    });
    document.getElementById('close-settings').addEventListener('click', () => {
        document.getElementById('settings-modal').classList.remove('open');
    });
    document.getElementById('settings-modal').addEventListener('click', e => {
        if (e.target.id==='settings-modal')
            document.getElementById('settings-modal').classList.remove('open');
    });

    // Language → refresh voices
    document.getElementById('lang-select').addEventListener('change', () => {
        currentLang = document.getElementById('lang-select').value;
        populateVoiceSelect(currentLang);
    });

    // Voice → instant
    document.getElementById('voice-select').addEventListener('change', () => {
        currentVoice = document.getElementById('voice-select').value;
        if (isPlaying) { stopPlay(); setTimeout(togglePlay, 150); }
    });

    // Save → refetch in new language
    document.getElementById('save-prefs-btn').addEventListener('click', () => {
        currentLang  = document.getElementById('lang-select').value;
        currentVoice = document.getElementById('voice-select').value;
        localStorage.setItem('selectedLang',  currentLang);
        localStorage.setItem('selectedVoice', currentVoice);
        document.getElementById('settings-modal').classList.remove('open');
        isFetching = false;
        fetchNews();
    });

    // Categories
    document.getElementById('category-bar').addEventListener('click', e => {
        const btn = e.target.closest('.cat-btn');
        if (!btn) return;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.getAttribute('data-cat');
        isFetching = false;
        fetchNews();
    });

    // Playback
    document.getElementById('play-btn').addEventListener('click', togglePlay);
    document.getElementById('next-btn').addEventListener('click', goNext);
    document.getElementById('prev-btn').addEventListener('click', goPrev);

    // Scroll tracking
    document.getElementById('feed').addEventListener('scroll', () => {
        const cards   = document.querySelectorAll('.card-wrapper');
        const feedTop = document.getElementById('feed').getBoundingClientRect().top;
        let closest=0, minDist=Infinity;
        cards.forEach((c,i) => {
            const d = Math.abs(c.getBoundingClientRect().top - feedTop);
            if (d < minDist) { minDist=d; closest=i; }
        });
        if (closest!==currentIndex) { currentIndex=closest; updateStatusDot(); }
    });

    // Cache check
    try {
        const ts      = parseInt(localStorage.getItem('newsflow_cache_ts')||'0');
        const cacLang = localStorage.getItem('newsflow_cache_lang')||'';
        const cacCat  = localStorage.getItem('newsflow_cache_cat') ||'';
        const fresh   = (Date.now()-ts) < 24*60*60*1000;
        const sameCtx = cacLang===currentLang && cacCat===currentCategory;
        const cached  = localStorage.getItem('newsflow_cache');
        if (fresh && sameCtx && cached) {
            allItems = JSON.parse(cached);
            mergeManual();
            renderFeed();
            setStatus('📦 Cached');
            setTimeout(() => { isFetching=false; fetchNews(); }, 5000);
        } else {
            fetchNews();
        }
    } catch(e) { fetchNews(); }

});
