<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>News Flow Pro - AI Flash News</title>
    <style>
        :root {
            --primary: #2563eb; --primary-dark: #1e40af; --bg: #f8fafc;
            --surface: #ffffff; --text: #0f172a; --text-sub: #64748b;
            --border: #e2e8f0; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --success: #10b981; --warning: #f59e0b; --groq: #f97316;
        }
        [data-theme="dark"] {
            --primary: #60a5fa; --primary-dark: #3b82f6; --bg: #0f172a;
            --surface: #1e293b; --text: #f8fafc; --text-sub: #94a3b8;
            --border: #334155; --shadow: 0 4px 6px -1px rgba(0,0,0,0.5);
            --groq: #fb923c;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); display: flex; align-items: center;
            justify-content: space-between; padding: 0 20px; z-index: 1000; transition: background 0.3s;
        }
        [data-theme="dark"] .header { background: rgba(30,41,59,0.85); }
        .logo { font-weight: 800; font-size: 1.25rem; color: var(--primary); letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .logo-badge { background: var(--primary); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: 700; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .icon-btn {
            background: transparent; border: 1px solid var(--border); color: var(--text);
            border-radius: 8px; width: 40px; height: 40px; display: flex; align-items: center;
            justify-content: center; font-size: 1.1rem; cursor: pointer; transition: all 0.2s;
        }
        .icon-btn:active { transform: scale(0.95); background: var(--border); }
        .status-indicator {
            display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-sub);
            padding: 4px 10px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border);
        }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
        .status-dot.groq-mode { background: var(--groq); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

        /* Category Bar */
        .category-bar {
            position: fixed; top: 60px; left: 0; right: 0; height: 44px;
            background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 8px; padding: 0 16px;
            overflow-x: auto; z-index: 999; scrollbar-width: none;
        }
        .category-bar::-webkit-scrollbar { display: none; }
        .cat-btn {
            white-space: nowrap; padding: 6px 14px; border-radius: 20px;
            border: 1px solid var(--border); background: transparent; color: var(--text-sub);
            font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .cat-btn:active { transform: scale(0.95); }

        /* Feed */
        .feed-container {
            height: 100vh; padding-top: 114px; padding-bottom: 170px;
            overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth;
        }
        .card-wrapper {
            min-height: calc(100vh - 284px); width: 100%; scroll-snap-align: center;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .card {
            background: var(--surface); width: 100%; max-width: 700px; padding: 30px;
            border-radius: 24px; border: 1px solid var(--border); box-shadow: var(--shadow);
            display: flex; flex-direction: column; max-height: 68vh; overflow-y: auto;
            position: relative; transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.15); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
        .badge { background: rgba(37,99,235,0.1); color: var(--primary); padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .manual-badge { background: rgba(16,185,129,0.1); color: var(--success); padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .source-badge { background: rgba(16,185,129,0.1); color: var(--success); padding: 6px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .headline { font-size: 1.5rem; font-weight: 800; line-height: 1.3; margin-bottom: 16px; color: var(--text); }
        .summary-section { background: rgba(37,99,235,0.05); padding: 16px; border-radius: 12px; margin-bottom: 16px; border-left: 3px solid var(--primary); }
        .groq-section { background: rgba(249,115,22,0.05); border-left: 3px solid var(--groq); }
        .basic-section { background: rgba(245,158,11,0.05); border-left: 3px solid var(--warning); }
        .summary-label { font-size: 0.7rem; color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .summary-label.groq { color: var(--groq); }
        .body-text { font-size: 1.05rem; line-height: 1.7; color: var(--text-sub); }
        .attribution { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--text-sub); font-style: italic; }

        /* Controls */
        .controls-bar {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--surface); padding: 12px 30px; border-radius: 50px;
            display: flex; align-items: center; gap: 30px;
            box-shadow: 0 20px 40px -5px rgba(0,0,0,0.3); z-index: 1000; border: 1px solid var(--border);
        }
        .ctrl-btn { background: none; border: none; font-size: 1.6rem; cursor: pointer; color: var(--text-sub); transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .ctrl-btn:active { transform: scale(0.85); color: var(--primary); }
        .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .play-btn { color: var(--primary); font-size: 2.2rem; }

        /* Footer */
        .footer {
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.85);
            border-top: 1px solid var(--border); padding: 8px 20px; text-align: center;
            font-size: 0.75rem; color: var(--text-sub); z-index: 999; backdrop-filter: blur(12px);
        }
        [data-theme="dark"] .footer { background: rgba(30,41,59,0.85); }
        .footer a { color: var(--primary); text-decoration: none; font-weight: 600; }

        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 2000;
            align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s;
        }
        .modal.open { display: flex; opacity: 1; }
        .modal-box {
            background: var(--surface); width: 90%; max-width: 500px; padding: 30px;
            border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            border: 1px solid var(--border); transform: scale(0.9); transition: transform 0.3s;
            max-height: 85vh; overflow-y: auto;
        }
        .modal.open .modal-box { transform: scale(1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 1.2rem; font-weight: 800; margin: 0; }
        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-sub); }
        label { display: block; font-size: 0.82rem; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        select, input {
            width: 100%; padding: 12px 14px; margin-bottom: 20px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.95rem; outline: none;
        }
        select:focus { border-color: var(--primary); }

        /* Voice Group Header in select */
        optgroup { font-weight: 700; font-style: normal; }

        .save-btn {
            width: 100%; padding: 15px; background: var(--primary); color: white; border: none;
            border-radius: 14px; font-size: 1rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 12px rgba(37,99,235,0.3); transition: transform 0.1s, background 0.2s;
        }
        .save-btn:active { transform: scale(0.98); }
        .save-btn:hover { background: var(--primary-dark); }

        .voice-count-badge {
            display: inline-block; background: rgba(37,99,235,0.1); color: var(--primary);
            font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: 700; margin-left: 8px;
        }

        .info-box {
            background: rgba(37,99,235,0.05); padding: 10px 14px; border-radius: 8px;
            font-size: 0.82rem; margin-bottom: 16px; border-left: 3px solid var(--primary); color: var(--text-sub);
        }

        @media (min-width: 768px) {
            .headline { font-size: 2rem; }
            .card { padding: 40px; max-width: 800px; }
            .body-text { font-size: 1.1rem; }
            .controls-bar { padding: 16px 40px; gap: 40px; }
        }
    </style>
</head>
<body data-theme="light">

<header class="header">
    <div class="logo"><span>News Flow</span><span class="logo-badge">AI</span></div>
    <div class="header-actions">
        <div class="status-indicator" id="status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Loading...</span>
        </div>
        <button class="icon-btn" onclick="ui.toggleTheme()" title="Toggle Dark Mode">🌓</button>
        <button class="icon-btn" onclick="ui.openSettings()" title="Preferences">⚙️</button>
    </div>
</header>

<!-- Category Bar -->
<div class="category-bar">
    <button class="cat-btn active" onclick="app.filterCategory('all', this)">🌐 All</button>
    <button class="cat-btn" onclick="app.filterCategory('top', this)">🔥 Top</button>
    <button class="cat-btn" onclick="app.filterCategory('india', this)">🇮🇳 India</button>
    <button class="cat-btn" onclick="app.filterCategory('world', this)">🌍 World</button>
    <button class="cat-btn" onclick="app.filterCategory('technology', this)">💻 Tech</button>
    <button class="cat-btn" onclick="app.filterCategory('business', this)">💼 Business</button>
    <button class="cat-btn" onclick="app.filterCategory('sports', this)">⚽ Sports</button>
    <button class="cat-btn" onclick="app.filterCategory('entertainment', this)">🎬 Entertainment</button>
    <button class="cat-btn" onclick="app.filterCategory('health', this)">🏥 Health</button>
    <button class="cat-btn" onclick="app.filterCategory('science', this)">🔬 Science</button>
</div>

<!-- Settings Modal -->
<div class="modal" id="settings">
    <div class="modal-box">
        <div class="modal-header">
            <h2 class="modal-title">⚙️ Preferences</h2>
            <button class="close-btn" onclick="ui.closeSettings()">✕</button>
        </div>

        <label>News Language</label>
        <select id="lang-select" onchange="ui.onLangChange()">
            <option value="en">English</option>
            <option value="hi">हिंदी (Hindi)</option>
            <option value="ta">தமிழ் (Tamil)</option>
            <option value="te">తెలుగు (Telugu)</option>
            <option value="kn">ಕನ್ನಡ (Kannada)</option>
            <option value="mr">मराठी (Marathi)</option>
            <option value="bn">বাংলা (Bengali)</option>
            <option value="ml">മലയാളം (Malayalam)</option>
            <option value="or">ଓଡ଼ିଆ (Odia)</option>
            <option value="es">Español (Spanish)</option>
            <option value="fr">Français (French)</option>
            <option value="de">Deutsch (German)</option>
            <option value="ru">Русский (Russian)</option>
            <option value="ja">日本語 (Japanese)</option>
            <option value="ar">العربية (Arabic)</option>
        </select>

        <label>
            Narrator Voice
            <span class="voice-count-badge" id="voice-count-badge">0 voices</span>
        </label>
        <div class="info-box" id="voice-info-box">
            Showing Google voices for the selected language. Select a voice and it applies instantly — no page reload needed.
        </div>
        <select id="voice-select" onchange="ui.onVoiceChange()" size="6" style="height:160px; margin-bottom:16px;"></select>

        <button class="save-btn" onclick="ui.savePrefs()">💾 Save & Apply</button>
    </div>
</div>

<!-- Feed -->
<div class="feed-container" id="feed">
    <div class="card-wrapper">
        <div class="card">
            <div class="card-header"><div class="badge">⚡ WELCOME</div></div>
            <div class="headline">News Flow Pro is Loading...</div>
            <div class="body-text"><p>Fetching the latest news. Please wait a moment.</p></div>
        </div>
    </div>
</div>

<!-- Controls -->
<div class="controls-bar">
    <button class="ctrl-btn" onclick="app.prev()" id="prev-btn">⏮</button>
    <button class="ctrl-btn play-btn" id="play-btn" onclick="app.togglePlay()">▶</button>
    <button class="ctrl-btn" onclick="app.next()" id="next-btn">⏭</button>
</div>

<footer class="footer">
    Copyright © 2026 | Designed by <a href="https://thosho.github.io/" target="_blank" rel="noopener noreferrer">Thosho Tech</a>
</footer>

// ============================================================
//  TTS ENGINE — Uses hardcoded GOOGLE_VOICES list
//  + Falls back to actual device voices via getVoices()
// ============================================================
const tts = {
    synth: window.speechSynthesis,
    deviceVoices: [],      // actual voices from browser
    currentLang: 'en',

    init() {
        const load = () => { this.deviceVoices = this.synth.getVoices(); };
        if (this.synth.onvoiceschanged !== undefined) this.synth.onvoiceschanged = load;
        load();
    },

    // Build voice list: hardcoded Google/System voices + any extra device voices for this lang
    buildVoiceListForLang(langCode) {
        const hardcoded = GOOGLE_VOICES[langCode] || [];
        const langBases = this._getLangBases(langCode);

        // Extra voices from device not in our hardcoded list
        const hardcodedNames = new Set(hardcoded.map(v => v.name.toLowerCase()));
        const extra = this.deviceVoices
            .filter(v => {
                const voiceLangBase = v.lang.toLowerCase().split('-')[0];
                return langBases.some(base => voiceLangBase === base) && !hardcodedNames.has(v.name.toLowerCase());
            })
            .map(v => ({ name: v.name, lang: v.lang, gender: '🔊', quality: 'Device' }));

        return [...hardcoded, ...extra];
    },

    _getLangBases(langCode) {
        const map = {
            en: ['en'], hi: ['hi'], ta: ['ta'], te: ['te'], kn: ['kn'],
            mr: ['mr'], bn: ['bn'], ml: ['ml'], or: ['or'],
            es: ['es'], fr: ['fr'], de: ['de'], ru: ['ru'], ja: ['ja'], ar: ['ar']
        };
        return map[langCode] || [langCode];
    },

    // Populate the voice <select> for a given language
    populateVoiceSelect(langCode) {
        const select = document.getElementById('voice-select');
        const badge = document.getElementById('voice-count-badge');
        if (!select) return;

        select.innerHTML = '';
        const voices = this.buildVoiceListForLang(langCode);

        // Group by quality tier
        const groups = {};
        voices.forEach(v => {
            const g = v.quality.startsWith('Google') ? '🎙️ Google Voices' :
                      v.quality.startsWith('System (macOS)') ? '🍎 macOS Voices' :
                      v.quality === 'Device' ? '🖥️ Device Voices' : '🖥️ System Voices';
            if (!groups[g]) groups[g] = [];
            groups[g].push(v);
        });

        const savedVoice = localStorage.getItem('selectedVoice');
        let firstOption = null;
        let count = 0;

        Object.entries(groups).forEach(([groupLabel, groupVoices]) => {
            const optgroup = document.createElement('optgroup');
            optgroup.label = groupLabel;
            groupVoices.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.name;
                opt.textContent = `${v.gender} ${v.name}`;
                if (v.name === savedVoice) opt.selected = true;
                if (!firstOption) firstOption = opt;
                optgroup.appendChild(opt);
                count++;
            });
            select.appendChild(optgroup);
        });

        // Auto-select first if nothing saved
        if (!savedVoice && firstOption) firstOption.selected = true;

        // Update badge
        if (badge) badge.textContent = `${count} voice${count !== 1 ? 's' : ''}`;
    },

    // Get the actual SpeechSynthesisVoice object by name
    resolveVoice(name) {
        // Try exact device voice match first
        const device = this.deviceVoices.find(v => v.name === name);
        if (device) return device;
        // Try partial match (for Google voices that vary slightly by OS)
        return this.deviceVoices.find(v => v.name.toLowerCase().includes(name.toLowerCase().split
        // Try partial match (for Google voices that vary slightly by OS)
        return this.deviceVoices.find(v => v.name.toLowerCase().includes(name.toLowerCase().split(' ')[1] || name.toLowerCase()));
    },

    async speak(text, onEnd) {
        this.cancel();
        const enhanced = this.addBasicPauses(text);
        this.currentUtterance = new SpeechSynthesisUtterance(enhanced);

        const vName = document.getElementById('voice-select')?.value;
        const voice = this.resolveVoice(vName);
        if (voice) {
            this.currentUtterance.voice = voice;
            this.currentUtterance.lang = voice.lang;
        } else {
            // Fallback: set lang manually so browser picks best available voice
            const langCode = app.currentLang;
            const hardcoded = GOOGLE_VOICES[langCode]?.[0];
            if (hardcoded) this.currentUtterance.lang = hardcoded.lang;
        }

        this.currentUtterance.rate = 0.9;
        this.currentUtterance.pitch = 1.0;
        this.currentUtterance.volume = 1.0;

        this.currentUtterance.onend = () => {
            if (onEnd) onEnd();
            setTimeout(() => app.next(), 1000);
        };

        this.currentUtterance.onerror = (e) => {
            console.warn('TTS error:', e.error);
            if (onEnd) onEnd();
        };

        this.synth.speak(this.currentUtterance);
    },

    addBasicPauses(text) {
        return text
            .replace(/\. /g, '., ')
            .replace(/: /g, ':, ')
            .replace(/; /g, ';, ')
            .replace(/ - /g, ', - ')
            .replace(/\? /g, '?, ')
            .replace(/! /g, '!, ');
    },

    cancel() {
        if (this.synth.speaking || this.synth.pending) this.synth.cancel();
    }
};

// ============================================================
//  GROQ AI SUMMARIZER
// ============================================================
const groqAI = {
    async summarize(text) {
        if (!GROQ_API_KEY) return null;
        try {
            const res = await fetch(CONFIG.GROQ_API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${GROQ_API_KEY}`
                },
                body: JSON.stringify({
                    model: 'llama-3.3-70b-versatile',
                    messages: [
                        { role: 'system', content: 'You are a news summarizer. Provide concise, factual 2-3 sentence summaries.' },
                        { role: 'user',   content: `Summarize this news in 2-3 clear sentences:\n\n${text}` }
                    ],
                    temperature: 0.3,
                    max_tokens: 200
                }),
                signal: AbortSignal.timeout(CONFIG.GROQ_TIMEOUT)
            });
            if (!res.ok) return null;
            const data = await res.json();
            return data.choices?.[0]?.message?.content?.trim() || null;
        } catch { return null; }
    }
};

// ============================================================
//  CACHE MANAGER
// ============================================================
const cacheManager = {
    get() {
        try {
            const ts = parseInt(localStorage.getItem(STORE.CACHE_TS) || '0');
            if (Date.now() - ts > STORE.CACHE_DURATION) return null;
            const data = localStorage.getItem(STORE.NEWS_CACHE);
            return data ? JSON.parse(data) : null;
        } catch { return null; }
    },
    set(items) {
        try {
            localStorage.setItem(STORE.NEWS_CACHE, JSON.stringify(items));
            localStorage.setItem(STORE.CACHE_TS, Date.now().toString());
        } catch(e) { console.warn('Cache save failed:', e); }
    }
};

// ============================================================
//  APP CORE
// ============================================================
const app = {
    allItems: [],
    filteredItems: [],
    idx: 0,
    isPlaying: false,
    currentLang: 'en',
    currentCategory: 'all',

    async init() {
        this.currentLang = localStorage.getItem('selectedLang') || 'en';

        // Set saved lang in dropdown
        const langSel = document.getElementById('lang-select');
        if (langSel) langSel.value = this.currentLang;

        tts.init();
        tts.populateVoiceSelect(this.currentLang);

        // Try cache first for instant display
        const cached = cacheManager.get();
        if (cached && cached.length > 0) {
            this.allItems = cached;
            this.mergeManualNews();
            this.filterCategory(this.currentCategory, document.querySelector('.cat-btn.active'));
            this.updateStatus('Cached');
            // Refresh in background
            this.fetchNews(true);
        } else {
            await this.fetchNews(false);
        }
    },

    async fetchNews(background = false) {
        if (!background) {
            document.getElementById('status-text').textContent = 'Fetching...';
        }

        const cat = this.currentCategory;
        const feedUrls =
            BASE_FEEDS[cat]?.[this.currentLang] ||
            BASE_FEEDS['all'][this.currentLang]  ||
            BASE_FEEDS['all']['en'];

        // Add admin-added custom feeds
        const customFeeds = this.getCustomFeeds();
        const allUrls = [...feedUrls, ...customFeeds];

        let allItems = [];
        for (const url of allUrls) {
            try {
                const res  = await fetch(CONFIG.PROXY_URL + encodeURIComponent(url));
                const data = await res.json();
                const xml  = new DOMParser().parseFromString(data.contents, 'text/xml');
                xml.querySelectorAll('item').forEach((item, i) => {
                    if (i < 12) {
                        allItems.push({
                            title:       item.querySelector('title')?.textContent || '',
                            description: item.querySelector('description')?.textContent?.replace(/<[^>]*>/g, '') || '',
                            link:        item.querySelector('link')?.textContent || '',
                            source:      (() => { try { return new URL(url).hostname.replace('www.',''); } catch { return 'News'; } })(),
                            pubDate:     item.querySelector('pubDate')?.textContent || '',
                            summaryMode: 'basic',
                            isManual:    false,
                            category:    cat
                        });
                    }
                });
            } catch(e) { console.warn('Feed error:', url, e.message); }
        }

        // Shuffle and limit
        allItems = allItems.sort(() => Math.random() - 0.5).slice(0, 25);

        // AI Summarize each item
        for (let item of allItems) {
            const text = `${item.title}. ${item.description}`.substring(0, 800);
            const summary = await groqAI.summarize(text);
            if (summary) {
                item.summary     = summary;
                item.summaryMode = 'groq';
            } else {
                item.summary     = this.basicSummary(item.description);
                item.summaryMode = 'basic';
            }
        }

        cacheManager.set(allItems);
        this.allItems = allItems;
        this.mergeManualNews();
        this.filterCategory(this.currentCategory, document.querySelector('.cat-btn.active'));
    },

    getCustomFeeds() {
        try {
            const data = localStorage.getItem(STORE.CUSTOM_FEEDS);
            return data ? JSON.parse(data).map(f => f.url) : [];
        } catch { return []; }
    },

    mergeManualNews() {
        try {
            const raw = localStorage.getItem(STORE.MANUAL_NEWS);
            if (!raw) return;
            const manual = JSON.parse(raw);
            this.allItems = this.allItems.filter(i => !i.isManual);
            manual.forEach(m => {
                this.allItems.unshift({
                    title:       m.title,
                    description: m.body,
                    summary:     m.summary || m.body.substring(0, 200) + '...',
                    source:      m.source || 'Admin',
                    link:        '',
                    pubDate:     m.date,
                    summaryMode: 'manual',
                    isManual:    true,
                    category:    m.category || 'all'
                });
            });
        } catch(e) { console.warn('Manual news merge error:', e); }
    },

    basicSummary(text) {
        const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 20);
        const s = sentences.slice(0, 2).join('. ').trim();
        return s ? s + (s.endsWith('.') ? '' : '.') : text.substring(0, 150) + '...';
    },

    filterCategory(cat, btn) {
        this.currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        this.filteredItems = cat === 'all'
            ? [...this.allItems]
            : this.allItems.filter(i => i.isManual ? (i.category === cat || i.category === 'all') : true);
        this.idx = 0;
        this.render();
    },

    render() {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';

        if (this.filteredItems.length === 0) {
            feed.innerHTML = `
                <div class="card-wrapper">
                    <div class="card">
                        <div class="headline">No news found</div>
                        <div class="body-text">Try a different category or language.</div>
                    </div>
                </div>`;
            return;
        }

        this.filteredItems.forEach(item => {
            const wrapper   = document.createElement('div');
            wrapper.className = 'card-wrapper';
            const isGroq   = item.summaryMode === 'groq';
            const isManual = item.isManual;

            wrapper.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <div class="${isManual ? 'manual-badge' : 'badge'}">
                            ${isManual ? '📌 EDITOR\'S PICK' : (LANG_NAMES[this.currentLang] || 'News')}
                        </div>
                        <div class="source-badge">📰 ${item.source}</div>
                    </div>
                    <div class="headline">${item.title}</div>
                    <div class="summary-section ${isGroq ? 'groq-section' : isManual ? '' : 'basic-section'}">
                        <div class="summary-label ${isGroq ? 'groq' : ''}">
                            ${isManual ? '📌 Admin Summary' : isGroq ? '⚡ Groq AI Summary' : '📝 Quick Summary'}
                        </div>
                        <div class="body-text">${item.summary}</div>
                    </div>
                    <div class="attribution">
                        Source: ${item.source}
                        ${item.link ? `· <a href="${item.link}" target="_blank" rel="noopener" style="color:var(--primary)">Read full article ↗</a>` : ''}
                    </div>
                </div>`;
            feed.appendChild(wrapper);
        });

        this.updateStatus();
    },

    togglePlay() { this.isPlaying ? this.pause() : this.play(); },

    play() {
        const item = this.filteredItems[this.idx];
        if (!item) return;
        this.isPlaying = true;
        document.getElementById('play-btn').textContent = '⏸';
        tts.speak(`${item.title}. ${item.summary}`, () => {
            this.isPlaying = false;
            document.getElementById('play-btn').textContent = '▶';
        });
    },

    pause() {
        this.isPlaying = false;
        document.getElementById('play-btn').textContent = '▶';
        tts.cancel();
    },

    next() {
        this.pause();
        if (this.idx < this.filteredItems.length - 1) {
            this.idx++;
            this.scrollToCard();
        }
    },

    prev() {
        this.pause();
        if (this.idx > 0) {
            this.idx--;
            this.scrollToCard();
        }
    },

    scrollToCard() {
        document.querySelectorAll('.card-wrapper')[this.idx]
            ?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        this.updateStatus();
    },

    updateStatus(label) {
        const dot = document.getElementById('status-dot');
        const txt = document.getElementById('status-text');
        if (dot) dot.classList.toggle('groq-mode', this.filteredItems[this.idx]?.summaryMode === 'groq');
        if (txt) txt.textContent = label || (this.filteredItems.length > 0 ? `${this.idx + 1} / ${this.filteredItems.length}` : 'Ready');
    }
};

const ui = {
    toggleTheme() {
        const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
    },

    openSettings() {
        // Always refresh voice list when opening settings
        tts.populateVoiceSelect(app.currentLang);
        document.getElementById('settings').classList.add('open');
    },

    closeSettings() {
        document.getElementById('settings').classList.remove('open');
    },

    onLangChange() {
        const lang = document.getElementById('lang-select').value;
        app.currentLang = lang;
        // Instantly refresh voice list for newly selected language — NO reload
        tts.populateVoiceSelect(lang);
    },

    onVoiceChange() {
        // Voice changes instantly — if currently playing, restart with new voice
        if (app.isPlaying) {
            app.pause();
            setTimeout(() => app.play(), 150);
        }
    },

    savePrefs() {
        const lang  = document.getElementById('lang-select').value;
        const voice = document.getElementById('voice-select').value;

        localStorage.setItem('selectedLang', lang);
        localStorage.setItem('selectedVoice', voice);
        app.currentLang = lang;

        this.closeSettings();

        // Refetch news only if language changed
        const prevLang = localStorage.getItem('prevLang');
        if (prevLang !== lang) {
            localStorage.setItem('prevLang', lang);
            app.fetchNews(false);
        }
    }
};

window.addEventListener('DOMContentLoaded', () => {
    // Apply saved theme
    const theme = localStorage.getItem('theme') || 'light';
    document.body.setAttribute('data-theme', theme);
    // Boot app
    app.init();
});
